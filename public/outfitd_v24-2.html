.co2-redirect-btn{width:100%;padding:10px;border:none;background:var(--accent);color:#fff;font-family:var(--font-b);font-size:12px;font-weight:700;letter-spacing:.5px;cursor:pointer;border-radius:var(--radius);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.co2-redirect-btn:hover{background:var(--accent-h);transform:translateY(-1px)}

/* ── MARKETPLACE CHECKOUT (direct purchase) ─────────────────── */
.mkt-checkout-section{background:var(--surface);border:1px solid rgba(22,163,74,.3);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px}
.mkt-seller-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.mkt-seller-avi{width:36px;height:36px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:1px solid var(--border)}
.mkt-seller-info{flex:1}
.mkt-seller-name{font-size:13px;font-weight:700;color:var(--text)}
.mkt-seller-handle{font-size:10px;color:var(--text3)}
.mkt-fee-note{font-size:10px;color:var(--text4);text-align:center;margin-top:8px;line-height:1.6}

/* Seller apply modal */
.seller-apply-steps{display:flex;gap:0;margin-bottom:18px}
.seller-apply-step{flex:1;text-align:center;padding:10px 4px;position:relative}
.seller-apply-step::after{content:'';position:absolute;top:16px;right:0;width:50%;height:2px;background:var(--border)}
.seller-apply-step:last-child::after{display:none}
.seller-apply-step-num{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:var(--font-m);color:var(--text4);margin:0 auto 5px}
.seller-apply-step.done .seller-apply-step-num{background:var(--green);border-color:var(--green);color:#fff}
.seller-apply-step-label{font-size:9px;color:var(--text4);letter-spacing:.5px;text-transform:uppercase;font-weight:700}

/* Order tracking notification */
.order-notify-box{background:rgba(22,163,74,.07);border:1px solid rgba(22,163,74,.25);border-radius:var(--radius);padding:12px 14px;margin-top:12px}
.order-notify-title{font-size:11px;font-weight:700;color:var(--green);margin-bottom:3px;letter-spacing:.4px}
.order-notify-sub{font-size:11px;color:var(--text3);line-height:1.6}

/* ── v16: MARKETPLACE PAGE ───────────────────────────────────── */
.mkt-hero{background:var(--surface);border:1px solid rgba(22,163,74,.3);border-radius:var(--radius-lg);padding:20px 22px 18px;margin-bottom:20px;position:relative;overflow:hidden}
.mkt-hero::before{content:'MARKET';position:absolute;right:-10px;top:50%;transform:translateY(-50%);font-family:var(--font-d);font-size:88px;letter-spacing:6px;color:rgba(22,163,74,.04);pointer-events:none;line-height:1;white-space:nowrap}
.mkt-seller-section{margin-bottom:28px}
.mkt-seller-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;transition:box-shadow .2s}
.mkt-seller-card:hover{box-shadow:var(--shadow)}
.mkt-seller-avatar{width:48px;height:48px;border-radius:50%;background:rgba(22,163,74,.1);border:2px solid rgba(22,163,74,.3);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.mkt-seller-stat{text-align:center;flex-shrink:0}
.mkt-seller-stat-val{font-family:var(--font-m);font-size:16px;font-weight:700;color:var(--text)}
.mkt-seller-stat-label{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.mkt-cta-box{text-align:center;padding:28px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg)}

/* ── v16: SELLER DASHBOARD MODAL ───────────────────────────────── */
.sdash-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.sdash-stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;text-align:center}
.sdash-stat-val{font-family:var(--font-m);font-size:18px;font-weight:700;color:var(--accent)}
.sdash-stat-label{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.sdash-order-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.sdash-order-row:last-child{border-bottom:none}
.sdash-status{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;font-family:var(--font-m);letter-spacing:.4px;white-space:nowrap}
.sdash-status-pending{background:rgba(217,119,6,.12);color:var(--gold);border:1px solid rgba(217,119,6,.3)}
.sdash-status-shipped{background:rgba(22,163,74,.1);color:var(--green);border:1px solid rgba(22,163,74,.25)}
.sdash-payout-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.sdash-payout-row:last-child{border-bottom:none}

/* ── v16: ADMIN SELLER APP CARDS ────────────────────────────────── */
.admin-app-card{background:rgba(22,163,74,.06);border:1px solid rgba(22,163,74,.2);border-radius:5px;padding:8px 10px;margin-bottom:6px}
.admin-app-brand{font-size:11px;font-weight:700;color:#e0e0e0;margin-bottom:3px}
.admin-app-meta{font-size:9px;color:#666;margin-bottom:6px;line-height:1.6}
.admin-app-btns{display:flex;gap:5px}
.admin-approve-btn{flex:1;padding:3px 0;border-radius:4px;border:1px solid rgba(22,163,74,.4);background:rgba(22,163,74,.2);color:#4ade80;font-size:9px;font-weight:700;cursor:pointer;font-family:var(--font-b)}
.admin-reject-btn{flex:1;padding:3px 0;border-radius:4px;border:1px solid rgba(201,24,74,.35);background:transparent;color:rgba(201,24,74,.9);font-size:9px;font-weight:700;cursor:pointer;font-family:var(--font-b)}

/* ── ADMIN SYSTEM ────────────────────────────────────────────── */
/* Panel floats over right side of screen — site stays fully visible */
.admin-panel{
  position:fixed;
  top:54px;right:0;bottom:0;
  width:300px;
  background:rgba(8,7,6,.94);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-left:1px solid rgba(201,24,74,.22);
  z-index:700;
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:-6px 0 28px rgba(0,0,0,.45);
}
.admin-panel.open{transform:translateX(0);}
.admin-panel-body{
  flex:1;overflow-y:auto;padding:14px 14px 24px;
  scrollbar-width:thin;scrollbar-color:#333 transparent;
}
.admin-panel-body::-webkit-scrollbar{width:4px;}
.admin-panel-body::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}

/* When admin panel is open, shrink main to leave space so nothing is covered */
#app.admin-open main,
#app.admin-open nav,
#app.admin-open footer{
  margin-right:300px;
  transition:margin-right .28s cubic-bezier(.4,0,.2,1);
}

.admin-section{margin-bottom:18px;}
.admin-section-title{
  font-size:9px;font-weight:700;letter-spacing:1.5px;color:rgba(201,24,74,.8);
  text-transform:uppercase;font-family:'Space Mono',monospace;
  margin-bottom:8px;padding-bottom:5px;
  border-bottom:1px solid rgba(201,24,74,.12);
  display:flex;align-items:center;justify-content:space-between;
}
.admin-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
.admin-stat{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:6px;padding:8px 10px;
}
.admin-stat-val{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:#f0ede8;}
.admin-stat-label{font-size:8px;color:#555;letter-spacing:.8px;text-transform:uppercase;margin-top:1px;}

.admin-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);
}
.admin-row:last-child{border-bottom:none;}
.admin-row-label{font-size:11px;color:#777;}
.admin-row-val{font-family:'Space Mono',monospace;font-size:10px;color:#f0ede8;font-weight:700;}

.admin-input{
  width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:#f0ede8;padding:7px 10px;border-radius:6px;
  font-family:'DM Sans',sans-serif;font-size:12px;
  outline:none;transition:border-color .2s;margin-bottom:7px;
}
.admin-input:focus{border-color:rgba(201,24,74,.6);}
.admin-btn{
  padding:5px 10px;border-radius:4px;border:1px solid rgba(201,24,74,.35);
  background:transparent;color:rgba(201,24,74,.9);font-size:10px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.4px;
  transition:all .15s;
}
.admin-btn:hover{background:rgba(201,24,74,.12);}
.admin-btn.danger{border-color:rgba(239,68,68,.35);color:rgba(239,68,68,.8);}
.admin-btn.danger:hover{background:rgba(239,68,68,.1);}
.admin-btn.full{width:100%;padding:6px;margin-top:2px;}

.admin-toggle{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);
}
.admin-toggle-label{font-size:11px;color:#888;}
.toggle-switch{
  width:32px;height:18px;background:rgba(255,255,255,.12);border-radius:9px;
  cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;
}
.toggle-switch.on{background:rgba(201,24,74,.7);}
.toggle-switch::after{
  content:'';position:absolute;width:12px;height:12px;background:#fff;
  border-radius:50%;top:3px;left:3px;transition:transform .2s;
  box-shadow:0 1px 3px rgba(0,0,0,.4);
}
.toggle-switch.on::after{transform:translateX(14px);}

/* Admin nav button in top-right */
#admin-nav-btn{
  border-color:rgba(201,24,74,.35) !important;
  color:rgba(201,24,74,.85) !important;
  font-size:14px;
}
#admin-nav-btn:hover{
  background:rgba(201,24,74,.1) !important;
  border-color:rgba(201,24,74,.7) !important;
}
.admin-close-btn{background:transparent;border:none;color:#555;font-size:18px;cursor:pointer;padding:2px 6px;line-height:1;transition:color .15s;border-radius:3px;}
.admin-close-btn:hover{color:#c9184a;}

/* ── DARK MODE SMOOTH TRANSITION ─────────────────────────── */
html,body{transition:background-color .25s}
nav,.site-footer,.sidebar,.builder-sidebar,.panel-hdr,.modal-box,.cart-drawer{
  transition:background-color .25s,border-color .2s
}

/* ── TOAST — above modals & checkout ─────────────────────── */
.toast{z-index:9999!important}

/* ── IMPROVED EMPTY CART ──────────────────────────────────── */
.cart-empty-cta{
  margin-top:10px;padding:9px 22px;background:var(--accent);color:#fff;
  border:none;border-radius:var(--radius);font-family:var(--font-b);
  font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.4px;
  transition:background .15s
}
.cart-empty-cta:hover{background:var(--accent-h)}

/* ── ONBOARDING TOOLTIP ───────────────────────────────────── */
.onboard-beacon{
  position:absolute;width:10px;height:10px;border-radius:50%;
  background:var(--accent);z-index:500;pointer-events:none;
  animation:beaconPulse 1.8s ease-in-out infinite
}
@keyframes beaconPulse{
  0%{box-shadow:0 0 0 0 rgba(201,24,74,.5)}
  70%{box-shadow:0 0 0 10px rgba(201,24,74,0)}
  100%{box-shadow:0 0 0 0 rgba(201,24,74,0)}
}
.onboard-pop{
  position:fixed;background:var(--text);color:var(--surface);
  padding:10px 14px;border-radius:var(--radius-lg);
  font-size:12px;font-weight:500;line-height:1.55;max-width:230px;
  z-index:8000;box-shadow:var(--shadow-lg);animation:slideUp .2s ease;
}
.onboard-pop-title{font-family:var(--font-d);font-size:15px;letter-spacing:1.5px;margin-bottom:4px}
.onboard-pop-arrow{
  position:absolute;width:0;height:0;
  border-left:6px solid transparent;border-right:6px solid transparent
}
.onboard-pop-arrow.up{top:-11px;border-bottom:11px solid var(--text)}
.onboard-pop-arrow.down{bottom:-11px;border-top:11px solid var(--text)}
.onboard-pop-footer{margin-top:8px;display:flex;justify-content:space-between;align-items:center}
.onboard-pop-step{font-size:10px;opacity:.5;font-family:var(--font-m)}
.onboard-pop-next{
  padding:4px 12px;background:var(--surface);color:var(--text);
  border:none;border-radius:var(--radius);font-size:11px;font-weight:700;
  cursor:pointer;font-family:var(--font-b);letter-spacing:.3px
}
.onboard-pop-next:hover{opacity:.85}
.onboard-overlay{
  position:fixed;inset:0;z-index:7999;
  background:rgba(0,0,0,.45);animation:fadeIn .2s
}

/* ── SCROLL POSITION MEMORY ───────────────────────────────── */
/* (handled via JS, no CSS needed) */

/* ── FOCUS / KEYBOARD ACCESSIBILITY ──────────────────────── */
:focus-visible{
  outline:2px solid var(--accent);outline-offset:2px;border-radius:var(--radius)
}
button:focus-visible,a:focus-visible{outline:2px solid var(--accent);outline-offset:2px}


/* ── DARK MODE SMOOTH TRANSITION ─────────────────────────── */
html,body,nav,.site-footer,.sidebar,.builder-sidebar,.cart-drawer,
.modal-box,.product-card,.tourney-card,.hof-card,.panel-hdr,
.content-area,.surface,.admin-panel{
  transition:background-color .25s,border-color .2s!important
}

/* ── TOAST — always above modals & checkout ─────────────────*/
.toast{z-index:9999!important}

/* ── ONBOARDING OVERLAY ──────────────────────────────────── */
.onboard-overlay{
  position:fixed;inset:0;z-index:7999;
  background:rgba(0,0,0,.45);animation:fadeIn .2s
}

:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:var(--radius)}

/* ══════════════════════════════════════════════════════════
   LEADERBOARD STYLES
   ══════════════════════════════════════════════════════════ */

/* Header card */
.lb-header{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:14px;
}
.lb-header-top{
  display:flex;justify-content:space-between;align-items:flex-start;
  gap:12px;margin-bottom:14px;flex-wrap:wrap;
}
.lb-countdown-wrap{text-align:center;}
.lb-countdown{
  font-family:var(--font-m);font-size:22px;font-weight:700;
  color:var(--accent);letter-spacing:2px;line-height:1;
  animation:lbPulse 1s ease-in-out infinite;
}
@keyframes lbPulse{0%,100%{opacity:1}50%{opacity:.7}}

.lb-pool-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
.lb-pool-chip{
  display:inline-flex;align-items:center;padding:5px 12px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;
}

.lb-brackets{display:flex;flex-wrap:wrap;gap:6px;}
.lb-bracket-chip{
  display:inline-flex;flex-direction:column;align-items:center;
  padding:6px 10px;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);min-width:72px;
}
.lb-bracket-rank{font-size:9px;font-weight:700;color:var(--text4);letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px;}
.lb-bracket-op{font-family:var(--font-m);font-size:12px;font-weight:700;color:var(--gold);}

/* Sub-tabs */
.lb-subtabs{
  display:flex;gap:4px;margin-bottom:10px;
  border-bottom:1px solid var(--border);padding-bottom:0;
}
.lb-subtab{
  padding:8px 16px;border:none;background:transparent;
  color:var(--text3);font-family:var(--font-b);font-size:12px;
  font-weight:700;cursor:pointer;border-bottom:2px solid transparent;
  letter-spacing:.5px;transition:all .18s;
}
.lb-subtab:hover{color:var(--text);}
.lb-subtab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* User rank bar */
.lb-myrank-bar{
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:8px;
  background:linear-gradient(135deg,rgba(201,24,74,.08),rgba(224,90,43,.06));
  border:1px solid rgba(201,24,74,.25);border-radius:var(--radius);
  padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--text2);
}
.lb-myrank-bar strong{color:var(--accent);}

/* Leaderboard list */
.lb-list{display:flex;flex-direction:column;gap:4px;margin-bottom:24px;}

.lb-empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:60px 20px;text-align:center;
}

/* Row */
.lb-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);
  cursor:pointer;transition:all .18s;
}
.lb-row:hover{border-color:var(--border2);transform:translateX(2px);box-shadow:var(--shadow);}
.lb-row-me{
  border-color:rgba(201,24,74,.35)!important;
  background:rgba(201,24,74,.04)!important;
}

/* Rank number */
.lb-rank-num{
  font-family:var(--font-m);font-size:13px;font-weight:700;
  color:var(--text4);min-width:26px;text-align:center;flex-shrink:0;
}
.lb-rank-1{font-size:20px;color:var(--gold);}
.lb-rank-2{font-size:18px;color:#9ca3af;}
.lb-rank-3{font-size:17px;color:#b45309;}

/* Avatar */
.lb-row-avi{
  width:30px;height:30px;border-radius:50%;background:var(--surface2);
  border:1px solid var(--border);display:flex;align-items:center;
  justify-content:center;font-size:15px;flex-shrink:0;
}

/* Info */
.lb-row-info{flex:1;min-width:0;}
.lb-row-title{
  font-size:13px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:flex;align-items:center;gap:6px;margin-bottom:2px;
}
.lb-row-meta{font-size:10px;color:var(--text4);display:flex;align-items:center;gap:5px;}

/* YOU badge */
.lb-you-badge{
  font-size:8.5px;font-weight:700;letter-spacing:.5px;
  background:var(--accent);color:#fff;padding:1px 6px;
  border-radius:6px;font-family:var(--font-m);flex-shrink:0;
}

/* Dampening badge */
.lb-damp-badge{
  font-size:9px;font-weight:700;color:var(--gold);
  background:rgba(217,119,6,.12);border:1px solid rgba(217,119,6,.25);
  padding:1px 6px;border-radius:6px;font-family:var(--font-m);cursor:help;
}

/* Likes */
.lb-row-likes{
  font-family:var(--font-m);font-size:12px;font-weight:700;
  color:var(--text3);flex-shrink:0;min-width:54px;text-align:right;
}

/* Reward */
.lb-row-reward{
  text-align:center;flex-shrink:0;min-width:56px;
}
.lb-reward-amt{
  font-family:var(--font-m);font-size:12px;font-weight:700;color:var(--gold);
  line-height:1.2;
}
.lb-reward-label{font-size:9px;color:var(--text4);letter-spacing:.5px;text-transform:uppercase;}
.lb-row-reward-none .lb-reward-label{color:var(--border2);}

/* CTA for logged-out */
.lb-login-cta{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:24px;
  max-width:380px;margin:0 auto;
}

/* Dark mode tweaks */
[data-dark] .lb-row-me{background:rgba(59,130,246,.06)!important;border-color:rgba(59,130,246,.3)!important;}
[data-dark] .lb-header{background:var(--surface);}
[data-dark] .lb-bracket-chip,[data-dark] .lb-pool-chip{background:var(--surface2);}


</style>

function genReferralCode(handle){
  // Deterministic code from handle: uppercase, strip @, take first 5 chars + 4 digits
  var base=(handle||'user').replace('@','').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,5);
  var num=0;
  for(var i=0;i<base.length;i++) num=(num*31+base.charCodeAt(i))&0xffff;
  return 'OFD-'+base+(num%10000).toString().padStart(4,'0');
}

function checkLoginStreak(){
  if(!S.loggedIn) return;
  var today=new Date().toDateString();
  // Run daily distribution whenever a new day is detected (login is a reliable trigger)
  checkDistribution();
  if(S.lastLoginDate===today) return; // already credited today
  var yesterday=new Date(Date.now()-86400000).toDateString();
  if(S.lastLoginDate===yesterday){
    S.loginStreak=(S.loginStreak||0)+1;
  } else {
    S.loginStreak=1; // reset (missed a day)
  }
  S.lastLoginDate=today;
  var bonus=STREAK_BONUS[(S.loginStreak-1)%7]||0;
  var total=STREAK_OP+bonus;
  __SEC.begin(); addInstantOP(total); __SEC.end();
  var msg=S.loginStreak===1
    ? 'Day 1 streak started! +'+fmtOP(STREAK_OP)+' OP'
    : S.loginStreak%7===0

function getOrGenReferralCode(){
  if(!S.referralCode) S.referralCode=genReferralCode(S.user.handle);
  return S.referralCode;
}

function applyReferralCode(code){
  if(!code||!code.trim()) return;
  if(S.referredBy){showToast('You\'ve already used a referral code');return;}

  var cleaned = code.trim().toUpperCase();

  // Format guard — must match OFD-XXXXX#### pattern
  if(!/^OFD-[A-Z0-9]{5,9}\d{4}$/.test(cleaned)){
    showToast('Invalid referral code format');
    return;
  }

  // Self-referral block — compare against own generated code
  var ownCode = genReferralCode(S.user.handle);
  if(cleaned === ownCode.toUpperCase()){
    showToast('You cannot use your own referral code');
    return;
  }

  S.referredBy = cleaned;
  __SEC.begin(); addInstantOP(1000); __SEC.end();
  showToast('✦ Referral applied! +1,000 bonus OP added');
  saveSession(getSessionType());
}

function copyReferralCode(){
  var code=getOrGenReferralCode();
  if(navigator.clipboard){
    navigator.clipboard.writeText(code).then(function(){showToast('Referral code copied: '+code);});
  } else {
    showToast('Your code: '+code+' — share it with friends!');
  }
}

// ── LEADERBOARD ENGINE ────────────────────────────────────────────────────────
// Daily top-100 competition: posts accumulate likes for 24 hours, ranks are
// computed at midnight UTC, and OP from the daily pool is awarded to
// qualifying posts. Momentum dampening prevents established creators from
// dominating every cycle without capping anyone's eligibility.
// ══════════════════════════════════════════════════════════════════════════════

// Known account ages for sample creators (days old) — prevents them all
// from qualifying for the newcomer pool simultaneously in the demo.
var _CREATOR_ACCOUNT_AGE_DAYS = {
  '@dripmaster_j':420, '@punkmaven':310, '@minimalfit':390,
  '@y2kqueen':260, '@gorpgirl':185, '@coastalwaves':205,
  '@jadecore':500, '@milo.fits':600, '@rinthrift':700,
  '@sashaouter':380, '@zoewears':320, '@kadestyle':800,
};
// Pre-seeded weekly wins for demo creators so momentum dampening is visible.
// These represent recent top-100 placements in the past 7 days.
var _DEMO_WEEKLY_WINS = {
  '@y2kqueen':    [Date.now()-1*86400000, Date.now()-3*86400000, Date.now()-5*86400000], // 3 recent wins
  '@minimalfit':  [Date.now()-2*86400000, Date.now()-4*86400000],                         // 2 recent wins
  '@dripmaster_j':[Date.now()-6*86400000],                                                // 1 recent win
};

function _lbGetAccountCreatedAt(handle){
  if(S.loggedIn && handle===S.user.handle) return S.accountCreatedAt || Date.now();
  var days=_CREATOR_ACCOUNT_AGE_DAYS[handle]||150;
  return Date.now()-days*86400000;
}

function _lbIsNewcomer(handle){
  return (Date.now()-_lbGetAccountCreatedAt(handle)) < LB_NEWCOMER_DAYS*86400000;
}

function _lbGetRecentWins(handle){
  // Merge demo wins with any real session wins
  var base=_DEMO_WEEKLY_WINS[handle]||[];
  var session=(S.weeklyWins&&S.weeklyWins[handle])||[];
  var all=base.concat(session);
  var cutoff=Date.now()-7*86400000;
  return all.filter(function(ts){return ts>cutoff;}).length;
}

function _lbGetPostLikes(post){
  var base=post.likes||0;
  if(S.likedPosts[post.id]) base+=1;
  return base;
}

function _lbGetEffectiveScore(post){
  var likes=_lbGetPostLikes(post);
  var wins=_lbGetRecentWins(post.user||'');
  return likes/(1+wins*LB_DAMPENING);
}

function _lbGetReward(rank, newcomer){
  var brackets=newcomer?LB_NEWCOMER_BRACKETS:LB_BRACKETS;
  for(var i=0;i<brackets.length;i++){
    if(rank>=brackets[i].from&&rank<=brackets[i].to) return brackets[i].each;
  }
  return 0;
}

function computeLeaderboard(newcomerOnly){
  var now=Date.now();
  var allPosts=[].concat(FEED_POSTS,S.userPosts);
  var eligible=allPosts.filter(function(p){
    if(!p.ts) return false;
    if((now-p.ts)>=LB_WINDOW_MS) return false;
    if(newcomerOnly&&!_lbIsNewcomer(p.user||'')) return false;
    return true;
  });
  var scored=eligible.map(function(p){
    return {
      post:p,
      likes:_lbGetPostLikes(p),
      score:_lbGetEffectiveScore(p),
      recentWins:_lbGetRecentWins(p.user||''),
      isDampened:_lbGetRecentWins(p.user||'')>0,
    };
  });
  scored.sort(function(a,b){return b.score-a.score;});
  return scored.slice(0,LB_SIZE);
}

function _fmtLBCountdown(){
  var now=Date.now();
  var msLeft=86400000-(now%86400000);
  var h=Math.floor(msLeft/3600000);
  var m=Math.floor((msLeft%3600000)/60000);
  var s=Math.floor((msLeft%60000)/1000);
  return (h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
}

function checkDistribution(){
  if(!S.loggedIn) return;
  var today=new Date().toDateString();
  if(S.lastDistributionDate===today) return;
  S.lastDistributionDate=today;

  var mainLB=computeLeaderboard(false);
  var newcomerLB=computeLeaderboard(true);
  var record={date:today,userRank:-1,userOP:0,newcomerRank:-1,newcomerOP:0};

  // Check main leaderboard placement
  var userMainRank=-1;
  mainLB.forEach(function(e,i){if(e.post.user===S.user.handle) userMainRank=i+1;});
  if(userMainRank>0){
    var mainReward=_lbGetReward(userMainRank,false);
    if(mainReward>0){
      record.userRank=userMainRank; record.userOP=mainReward;
      if(!S.weeklyWins[S.user.handle]) S.weeklyWins[S.user.handle]=[];
      S.weeklyWins[S.user.handle].push(Date.now());
      setTimeout(function(){
        __SEC.begin();
        addInstantOP(mainReward,'🏆 Leaderboard #'+userMainRank+' — +'+fmtOP(mainReward)+' OP awarded!');
        __SEC.end();
      },600);
    }
  }

  // Check newcomer leaderboard placement
  if(_lbIsNewcomer(S.user.handle)){
    var userNewcomerRank=-1;
    newcomerLB.forEach(function(e,i){if(e.post.user===S.user.handle) userNewcomerRank=i+1;});
    if(userNewcomerRank>0){
      var newcomerReward=_lbGetReward(userNewcomerRank,true);
      if(newcomerReward>0){
        record.newcomerRank=userNewcomerRank; record.newcomerOP=newcomerReward;
        setTimeout(function(){
          __SEC.begin();
          addInstantOP(newcomerReward,'🌟 Newcomer #'+userNewcomerRank+' — +'+fmtOP(newcomerReward)+' OP!');
          __SEC.end();
        },1400);
      }
    }
  }

  S.distributionHistory.unshift(record);
  if(S.distributionHistory.length>30) S.distributionHistory.pop();
  saveSession(getSessionType());
}

// ══════════════════════════════════════════════════════════════════════════════
// ── SECURITY MODULE v1 ───────────────────────────────────────────────────────
// Runs immediately; protects OP integrity, rate-limits actions, and hardens
// battle entries/votes against localStorage tampering and console injection.
// ══════════════════════════════════════════════════════════════════════════════
(function(){

  // ── A. SESSION TOKEN ───────────────────────────────────────────────────────
  // Randomly generated each page load — used to gate sensitive functions so
  // they cannot be called cleanly from the browser console.
  var _tok = Date.now().toString(36) + Math.random().toString(36).slice(2) +
              Math.random().toString(36).slice(2);

  // One-time ticket system: begin() mints a ticket valid for _TTL ms.
  // ok() validates AND immediately destroys the ticket — so each begin/end
  // pair can only authorise ONE addInstantOP call. Stacking begin() calls
  // does not stack permissions; the ticket is just refreshed.
  var _ticket = null;
  var _ticketBorn = 0;
  var _TTL = 200; // ms

  window.__SEC = {
    begin : function(){
      _ticket = Math.random().toString(36).slice(2) + Date.now().toString(36);
      _ticketBorn = Date.now();
    },
    end   : function(){ _ticket = null; _ticketBorn = 0; },
    ok    : function(){
      if(!_ticket) return false;
      if(Date.now() - _ticketBorn > _TTL){ _ticket = null; return false; }
      _ticket = null; // consume — one use only
      return true;
    },
    token : function(){ return _tok; }
  };
  // Freeze so console can't monkey-patch the methods
  Object.freeze(window.__SEC);

  // ── B. OP INTEGRITY CHECKSUM ───────────────────────────────────────────────
  // Detects if a user edited their OP balance directly in localStorage.
  // On load: mismatch → balance reset to 0 and account flagged.
  var _INT_SALT = 'outfitd_integrity_9f2a_v1';

  window._computeOPChecksum = function(points, handle){
    var s = Math.round(points||0) + '|' + (handle||'') + '|' + _INT_SALT;
    var h = 0x811c9dc5;
    for(var i=0;i<s.length;i++){h ^= s.charCodeAt(i); h=(h*0x01000193)>>>0;}
    return h.toString(36);
  };

  window._verifyOPChecksum = function(points, handle, stored){
    return _computeOPChecksum(points, handle) === stored;
  };

  // ── B2. COSMETICS INTEGRITY CHECKSUM ───────────────────────────────────────
  // Prevents adding free frames/themes by editing localStorage.
  window._computeCosmeticsChecksum = function(frames, themes, handle){
    var s = (frames||[]).slice().sort().join(',') + '||' +
            (themes||[]).slice().sort().join(',') + '||' +
            (handle||'') + '||' + _INT_SALT + '_cosmetics_v1';
    var h = 0x811c9dc5;
    for(var i=0;i<s.length;i++){h ^= s.charCodeAt(i); h=(h*0x01000193)>>>0;}
    return h.toString(36);
  };

  window._verifyCosmeticsChecksum = function(frames, themes, handle, stored){
    return _computeCosmeticsChecksum(frames, themes, handle) === stored;
  };

  // ── C. OP SHIMS ────────────────────────────────────────────────────────────
  // Legacy call sites may reference these; kept as no-ops so nothing breaks.
  window._clampDailyOP  = function(amount){ return amount; };
  window._addToDailyCap = function(){};
  window._getDailyEarned = function(){ return 0; };

  // ── D. ACTION RATE LIMITER ─────────────────────────────────────────────────
  var _stamps = {};
  var _LIMITS = {
    vote   : 4000,   // ms between any two votes
    like   : 800,
    post   : 20000,  // 20 s between posts
    comment: 4000,
    report : 8000,
    join   : 3000    // between tourney joins
  };

  window._rateOK = function(action){
    var now=Date.now(); var last=_stamps[action]||0;
    var cd=_LIMITS[action]||2000;
    if(now-last < cd){
      var left=Math.ceil((cd-(now-last))/1000);
      showToast('⏱ Hold on — wait '+left+'s before doing that again');
      return false;
    }
    _stamps[action]=now;
    return true;
  };

  // ── E. BATTLE ENTRY LEDGER ─────────────────────────────────────────────────
  // Signed entry records stored in their own localStorage key — independent of
  // the main session so clearing/editing the session can't erase entry history.
  var _ENTRY_SALT = 'ofd_entry_v1';
  var _entries = {};

  function _signEntry(tid, handle){
    var s = 'e|'+tid+'|'+(handle||'')+'|'+_ENTRY_SALT;
    var h=0x811c9dc5;
    for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h=(h*0x01000193)>>>0;}
    return h.toString(36);
  }

  window._recordEntry = function(tid, handle){
    _entries[tid] = _signEntry(tid, handle);
    try{ localStorage.setItem('ofd_entries', JSON.stringify(_entries)); }catch(e){}
  };

  window._hasEntry = function(tid, handle){
    if(S.joinedIn && S.joinedIn[tid]) return true;
    var stored = _entries[tid];
    return stored && stored === _signEntry(tid, handle);
  };

  window._loadEntries = function(){
    try{
      var raw=localStorage.getItem('ofd_entries');
      if(raw) _entries=JSON.parse(raw);
    }catch(e){}
  };

  // ── F. VOTE LEDGER ─────────────────────────────────────────────────────────
  // Same pattern: votes persisted independently of main session.
  var _VOTE_SALT = 'ofd_vote_v1';
  var _votes = {};

  function _signVote(tid, uid, handle){
    var s = 'v|'+tid+'|'+uid+'|'+(handle||'')+'|'+_VOTE_SALT;
    var h=0x811c9dc5;
    for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h=(h*0x01000193)>>>0;}
    return h.toString(36);
  }

  window._recordVote = function(tid, uid, handle){
    _votes[tid] = { uid:uid, sig:_signVote(tid, uid, handle) };
    try{ localStorage.setItem('ofd_votes', JSON.stringify(_votes)); }catch(e){}
  };

  window._hasVoted = function(tid, handle){
    if(S.votedIn && S.votedIn[tid]) return true;
    var rec = _votes[tid];
    if(!rec) return false;
    // Validate signature to catch manual localStorage edits
    return rec.sig === _signVote(tid, rec.uid, handle);
  };

  window._getVotedUID = function(tid){ return _votes[tid]?_votes[tid].uid:null; };

  window._loadVotes = function(){
    try{
      var raw=localStorage.getItem('ofd_votes');
      if(raw) _votes=JSON.parse(raw);
    }catch(e){}
  };

  // ── G. CONSOLE FUNCTION GUARD ──────────────────────────────────────────────
  // Overrides the global addInstantOP so calling it from the console does
  // nothing. Legitimate internal callers wrap with __SEC.begin/end.
  // Runs after the function is defined — see the patch below.
  var _guardApplied = false;
  window._patchConsoleGuard = function(){
    if(_guardApplied) return; // only wrap once
    if(typeof addInstantOP !== 'function') return;
    _guardApplied = true;
    var _real = addInstantOP;
    addInstantOP = function(amount, msg, _skipCap){
      if(!__SEC.ok()){
        // Console/injected call — silently block and reset UI in case someone
        // tried to modify S.user.points directly before calling
        if(S.loggedIn && S.user && typeof S.user.points === 'number'){
          try{
            var raw=localStorage.getItem(SESSION_KEY);
            if(raw){
              var d=JSON.parse(raw);
              var storedPoints=d.user&&d.user.points;
              var storedCS=d.user&&d.user.opChecksum;
              if(storedPoints!==undefined && storedCS!==undefined){
                if(!_verifyOPChecksum(storedPoints, d.user.handle||'', storedCS)){
                  // Tampering detected — reset
                  S.user.points=0;renderOPPill();saveSession(getSessionType());
                  showToast('⛔ Account integrity error — balance reset');
                  return;
                }
                // Restore to last verified value
                S.user.points=storedPoints; renderOPPill();
              }
            }
          }catch(e){}
        }
        return; // block the call
      }
      _real(amount, msg, _skipCap);
    };
  };

})();
// ── END SECURITY MODULE ──────────────────────────────────────────────────────

// Get set of all registered handles from localStorage
function getRegisteredHandles(){
  try{
    var raw=localStorage.getItem(HANDLES_KEY);
    return raw?JSON.parse(raw):[];
  }catch(e){ return []; }
}
function registerHandle(handle){
  if(!handle) return;
  var h=handle.toLowerCase().replace('@','');
  var handles=getRegisteredHandles();
  if(handles.indexOf(h)<0){ handles.push(h); }
  try{ localStorage.setItem(HANDLES_KEY,JSON.stringify(handles)); }catch(e){}
}
function isHandleTaken(handle){
  if(!handle) return false;
  var h=handle.toLowerCase().replace('@','').trim();
  // Admin handles are never blocked (owner can always reclaim)
  if(typeof hashAdminHandle==='function' && typeof ADMIN_HANDLE_HASHES!=='undefined'){
    if(ADMIN_HANDLE_HASHES.indexOf(hashAdminHandle(h))>-1) return false;
  }
  var registered=getRegisteredHandles().map(function(r){return r.toLowerCase().replace('@','');});
  return registered.indexOf(h)>-1;
}

function loadSession() {
  try {
    var raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return false;
    var data = JSON.parse(raw);
    if (data.type === 'temporary' && data.expiresAt && Date.now() > data.expiresAt) {
      localStorage.removeItem(SESSION_KEY);
      return false;
    }
    S.user = Object.assign(S.user, data.user);
    if(data.user&&data.user.bannerBg) S.user.bannerBg=data.user.bannerBg;

    // ── OP Integrity check: detect direct localStorage edits ──
    if(data.user && typeof data.user.points === 'number'){
      var storedCS = data.user.opChecksum;
      if(storedCS && !_verifyOPChecksum(data.user.points, data.user.handle||'', storedCS)){
        S.user.points = 0;
        console.warn('[OUTFITD] OP balance integrity failure — balance reset');
        try{
          var _d2=JSON.parse(raw);
          _d2.user.points=0;
          _d2.user.opChecksum=_computeOPChecksum(0, _d2.user.handle||'');
          localStorage.setItem(SESSION_KEY, JSON.stringify(_d2));
        }catch(e2){}
      }
    }

    // ── Cosmetics Integrity check: detect injected frames/themes ──
    if(data.user && data.user.cosmeticsChecksum){
      var storedFr = data.user.ownedFrames||[];
      var storedTh = data.user.ownedThemes||[];
      if(!_verifyCosmeticsChecksum(storedFr, storedTh, data.user.handle||'', data.user.cosmeticsChecksum)){
        console.warn('[OUTFITD] Cosmetics integrity failure — owned items reset');
        S.user.ownedFrames = [];
        S.user.ownedThemes = [];
      }
    }

    // ── Load signed battle ledgers (survive session wipe) ──
    _loadEntries();
    _loadVotes();
    // Sync session joinedIn/votedIn from ledger (in case session was partially wiped)
    if(typeof S.joinedIn !== 'object') S.joinedIn = {};
    if(typeof S.votedIn  !== 'object') S.votedIn  = {};

    S.likedPosts = data.likedPosts || {};
    S.savedPosts = data.savedPosts || {};
    S.following = data.following || {};
    S.userPosts = data.userPosts || [];
    S.commentTexts = data.commentTexts || {};
    S.wishlist         = data.wishlist || {};
    S.savedAddress     = data.savedAddress || {};
    S.savedCard        = data.savedCard || {};
    S.reportedPosts    = data.reportedPosts || {};
    S.sizeNotify       = data.sizeNotify || {};
    S.lastLoginDate    = data.lastLoginDate || null;
    S.loginStreak      = data.loginStreak || 0;
    S.referralCode     = data.referralCode || '';
    S.referredBy       = data.referredBy || null;
    S.accountCreatedAt    = data.accountCreatedAt || null;
    S.weeklyWins          = data.weeklyWins || {};
    S.lastDistributionDate= data.lastDistributionDate || null;
    S.distributionHistory = data.distributionHistory || [];
    S.user.email       = data.email || null; // restore email for account sync
    if (data.activeTheme) S.activeTheme = data.activeTheme;
    if (data.darkMode) { S.darkMode = true; document.documentElement.setAttribute('data-dark', ''); }
    S.loggedIn = true;
    syncThemeAccent(); renderThemeNavBtn();
    document.getElementById('auth-area').style.display = 'none';
    renderUserChip(); renderOPPill(); renderCrewNavTab();
    if (data.type === 'temporary' && data.expiresAt) startBannerTimer(data.expiresAt);

    // ── Activate console guard now that addInstantOP is defined ──
    _patchConsoleGuard();

    return true;
  } catch(e) { return false; }
}

function startBannerTimer(expiresAt) {
  stopBannerTimer();
  _bannerTimer = setInterval(function() {
    var remaining = expiresAt - Date.now();
    if (remaining <= 0) {
      stopBannerTimer();
      clearSession();
      doLogout();
      hideBanner();
      openModal('session-expired');
      return;
    }
    var fiveMins = 5 * 60 * 1000;
    if (remaining <= fiveMins) { showBanner(remaining); }
    var el = document.getElementById('sb-countdown');
    if (el) el.textContent = fmtCountdown(remaining);
  }, 1000);
}

function stopBannerTimer() {
  if (_bannerTimer) { clearInterval(_bannerTimer); _bannerTimer = null; }
}

function fmtCountdown(ms) {
  var s = Math.max(0, Math.floor(ms / 1000));
  var m = Math.floor(s / 60); s = s % 60;
  return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
}

function showBanner(remaining) {
  var b = document.getElementById('session-banner');
  if (b) b.classList.add('show');
  var el = document.getElementById('sb-countdown');
  if (el) el.textContent = fmtCountdown(remaining);
}

function hideBanner() {
  var b = document.getElementById('session-banner');
  if (b) b.classList.remove('show');
}

function _startGuestTimer(){
  _stopGuestTimer();
  _guestTimer = setInterval(function(){
    if(!S.isGuest || !S.guestExpiresAt){ _stopGuestTimer(); return; }
    var remaining = S.guestExpiresAt - Date.now();
    // Update timer display
    var el = document.getElementById('guest-timer');
    if(el) el.textContent = _fmtGuestTime(remaining);
    // Turn red in last 5 minutes
    var banner = document.getElementById('guest-banner');
    if(banner && remaining < 5*60*1000) banner.style.background = 'linear-gradient(90deg,rgba(201,24,74,.2),rgba(201,24,74,.15))';
    // Expired
    if(remaining <= 0){
      _stopGuestTimer();
      endGuestSession();
      openModal('session-expired');
    }
  }, 1000);
}

function _stopGuestTimer(){
  if(_guestTimer){ clearInterval(_guestTimer); _guestTimer = null; }
}

function _fmtGuestTime(ms){
  var s = Math.max(0, Math.floor(ms/1000));
  var m = Math.floor(s/60); s = s%60;
  return (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
}

function rememberSize(size, category){
  if(!size) return;
  var cat=category||'default';
  if(!S.preferredSizes) S.preferredSizes={};
  S.preferredSizes[cat]=size;
  S.preferredSize=size; // keep global fallback
  try{
    localStorage.setItem('outfitd_pref_sizes', JSON.stringify(S.preferredSizes));
    localStorage.setItem('outfitd_pref_size', size);
  }catch(e){}
}

function getPreferredSize(availableSizes, category){
  if(!S.preferredSizes) S.preferredSizes={};
  var cat=category||'default';
  var pref=S.preferredSizes[cat];
  // Fall back to global pref, then localStorage
  if(!pref){ pref=S.preferredSize; }
  if(!pref){ try{ pref=localStorage.getItem('outfitd_pref_size')||''; }catch(e){} }
  if(pref&&availableSizes.indexOf(pref)>-1) return pref;
  return availableSizes[0]||null;
}

function getProducts(){
  var items=ALL_PRODUCTS;
  // Source filter
  if(S.sourceFilter==='Brands') items=items.filter(function(p){return p.type!=='marketplace';});
  else if(S.sourceFilter==='Marketplace') items=items.filter(function(p){return p.type==='marketplace';});
  if(S.catFilter!=='All') items=items.filter(function(p){return p.category===S.catFilter;});
  if(S.styleFilter.length) items=items.filter(function(p){return S.styleFilter.some(function(s){return p.style.indexOf(s)>-1;});});
  if(S.colorFilter) items=items.filter(function(p){return p.color===S.colorFilter;});
  if(S.brandFilter!=='All Brands') items=items.filter(function(p){return p.brand===S.brandFilter;});
  if(S.sizeFilter.length) items=items.filter(function(p){return S.sizeFilter.some(function(s){return p.size.indexOf(s)>-1;});});
  items=items.filter(function(p){return p.price<=S.priceMax;});
  if(S.aiResult){
    var ai=S.aiResult;
    items=items.filter(function(p){
      var ok=true;
      if(ai.category&&ai.category!=='any') ok=ok&&p.category.toLowerCase().indexOf(ai.category.toLowerCase())>-1;
      if(ai.color) ok=ok&&p.color.toLowerCase()===ai.color.toLowerCase();
      if(ai.priceMax) ok=ok&&p.price<=ai.priceMax;
      if(ai.styles&&ai.styles.length) ok=ok&&ai.styles.some(function(s){return p.style.some(function(ps){return ps.toLowerCase().indexOf(s.toLowerCase())>-1;});});
      if(ai.keywords&&ai.keywords.length) ok=ok&&ai.keywords.some(function(k){var kl=k.toLowerCase();return p.name.toLowerCase().indexOf(kl)>-1||p.brand.toLowerCase().indexOf(kl)>-1||p.style.some(function(s){return s.toLowerCase().indexOf(kl)>-1;});});
      return ok;
    });
  } else if(S.shopSearch.trim()){
    var q=S.shopSearch.toLowerCase();
    items=items.filter(function(p){return p.name.toLowerCase().indexOf(q)>-1||p.brand.toLowerCase().indexOf(q)>-1||p.style.some(function(s){return s.toLowerCase().indexOf(q)>-1;})||p.color.toLowerCase().indexOf(q)>-1;});
  }
  return items;
}

// Fills the active outfit in the builder with top matched items (one per zone)
function addTopMatchesToBuilder(){
  var items=getPersonalizedProducts();
  var zones=['head','top','bottom','shoes','acc'];
  var zoneMap={'head':['Headwear'],'top':['Tops','Activewear'],'bottom':['Bottoms'],'shoes':['Footwear'],'acc':['Accessories']};
  var filled=0;
  zones.forEach(function(zone){
    var cats=zoneMap[zone];
    var match=items.find(function(p){return cats.indexOf(p.category)>-1;});
    if(match){
      var o=S.outfits.find(function(x){return x.id===S.activeOutfitId;});

        if(!o.items[zone]){o.items[zone]=match;filled++;}
      }
    }
  });
  if(filled>0){
    showToast('✦ '+filled+' piece'+(filled!==1?'s':'')+' added to your look');
    switchTab('builder');
  } else {
    showToast('Outfit slots already filled — clear your builder first');
  }
}

// ─────────────────────── PERSONALISATION ENGINE ──────────────────────────────
// Returns a map of {styleName -> score} derived from the logged-in user's
// engagement history (liked, saved, wishlisted, own posts).
function getStyleAffinity(){
  if(!S.loggedIn) return {};
  var scores={};
  function credit(style,weight){
    if(!style) return;
    scores[style]=(scores[style]||0)+weight;
  }
  // Liked posts
  var allPosts=[].concat(FEED_POSTS,S.userPosts);
  allPosts.forEach(function(p){
    if(S.likedPosts[p.id]) credit(p.style,3);
    if(S.savedPosts[p.id]) credit(p.style,4);
  });
  // Own posts
  S.userPosts.forEach(function(p){ credit(p.style,2); });
  // Wishlisted products — credit their styles
  ALL_PRODUCTS.forEach(function(p){
    if(S.wishlist[p.id]){
      (p.style||[]).forEach(function(s){ credit(s,2); });
    }
  });
  return scores;
}

// Returns products sorted for the current user:
//   - If shopLookContext active: style-matched items float first, then rest
//   - If logged in with affinity data: scored and ranked
//   - Otherwise: new/badge items first, then default catalogue order
function getPersonalizedProducts(){
  var items=getProducts(); // already applies source/cat/style/etc filters

  var ctx=S.shopLookContext;
  if(ctx && ctx.style){
    // Sort: exact style match first, then partial tag match, then rest
    items=items.slice().sort(function(a,b){
      function score(p){
        var s=0;
        if((p.style||[]).indexOf(ctx.style)>-1) s+=10;
        if(ctx.budget && p.price<=ctx.budget*1.3) s+=2;
        if(ctx.tags&&ctx.tags.length){
          ctx.tags.forEach(function(t){
            var tl=t.toLowerCase();
            if(p.name.toLowerCase().indexOf(tl)>-1||
               (p.style||[]).some(function(ps){return ps.toLowerCase().indexOf(tl)>-1;})) s+=1;
          });
        }
        return s;
      }
      return score(b)-score(a);
    });
    return items;
  }

  if(S.loggedIn){
    var aff=getStyleAffinity();
    var hasAffinity=Object.keys(aff).length>0;
    if(hasAffinity){
      items=items.slice().sort(function(a,b){
        function affScore(p){
          return (p.style||[]).reduce(function(acc,s){return acc+(aff[s]||0);},0);
        }
        return affScore(b)-affScore(a);
      });
      return items;
    }
  }

  // Guest / new user — surface badged/new items first, then default
  items=items.slice().sort(function(a,b){
    var aBadge=a.badge?1:0;
    var bBadge=b.badge?1:0;
    return bBadge-aBadge;
  });
  return items;
}

function runAISearch(){
  var q=document.getElementById('shop-search').value.trim();
  if(!q){S.aiResult=null;renderShop();return;}
  S.aiLoading=true;S.shopSearch=q;
  var _sbtn=document.getElementById('shop-search-btn');if(_sbtn){_sbtn.disabled=true;_sbtn.textContent='…';}
  renderShop();
  var body=JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:'Parse this fashion search and return ONLY JSON (no markdown):\nQuery: "'+q+'"\nReturn: {"category":null,"styles":[],"color":null,"priceMax":null,"keywords":[],"summary":"brief description"}'}]});
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:body})
    .then(function(r){return r.json();})
    .then(function(d){
      try{
        var raw=d.content.map(function(b){return b.text||'';}).join('').trim().replace(/```json|```/g,'').trim();
        S.aiResult=JSON.parse(raw);
      }catch(e){S.aiResult={summary:'Showing closest matches',keywords:[q.split(' ')[0]]};}
      S.aiLoading=false;var _s2=document.getElementById('shop-search-btn');if(_s2){_s2.disabled=false;_s2.textContent='✦';}
      renderShop();
    })
    .catch(function(){
      S.aiResult={summary:'Showing closest matches',keywords:[q.split(' ')[0]]};
      S.aiLoading=false;var _s3=document.getElementById('shop-search-btn');if(_s3){_s3.disabled=false;_s3.textContent='✦';}
      renderShop();
    });
}

function activeOutfit(){
  return S.outfits.find(function(o){return o.id===S.activeOutfitId;})||S.outfits[0];
}
function activeOutfitItems(){return activeOutfit().items;}
function setActiveOutfit(id){S.activeOutfitId=id;S.builderActiveZone=null;S.builderSearch='';renderBuilder();}
function createOutfit(){
  S._outfitCounter++;
  var o={id:S._outfitCounter,name:'LOOK '+S._outfitCounter,items:{head:null,top:null,bottom:null,shoes:null,acc:null}};
  S.outfits.push(o);S.activeOutfitId=o.id;S.builderActiveZone=null;S.builderSearch='';renderBuilder();
  showToast('✦ New outfit created');
}
function deleteOutfit(id){
  if(S.outfits.length<=1){showToast('Need at least one outfit');return;}
  S.outfits=S.outfits.filter(function(o){return o.id!==id;});
  if(S.activeOutfitId===id) S.activeOutfitId=S.outfits[0].id;
  S.builderActiveZone=null;renderBuilder();showToast('Outfit removed');
}
function renameOutfit(id){
  var o=S.outfits.find(function(x){return x.id===id;});if(!o)return;
  var name=prompt('Rename outfit:',o.name);
  if(name&&name.trim()){o.name=name.trim().toUpperCase();renderBuilder();}
}
function duplicateOutfit(id){
  var o=S.outfits.find(function(x){return x.id===id;});if(!o)return;
  S._outfitCounter++;
  var copy={id:S._outfitCounter,name:o.name+' COPY',items:{head:o.items.head||null,top:o.items.top||null,bottom:o.items.bottom||null,shoes:o.items.shoes||null,acc:o.items.acc||null}};
  S.outfits.push(copy);S.activeOutfitId=copy.id;S.builderActiveZone=null;renderBuilder();
  showToast('Outfit duplicated');
}

// ─────────────────────── REVIEW HELPERS ───────────────────────
function getProductReviews(pid){return S.reviews[pid]||[];}
function getProductRating(pid){
  var revs=getProductReviews(pid);
  if(!revs.length)return null;
  var avg=revs.reduce(function(a,r){return a+r.rating;},0)/revs.length;
  return {avg:avg,count:revs.length};
}
function renderStars(rating,size){
  var s=size||12;var full=Math.round(rating);var out='';
  for(var i=1;i<=5;i++) out+='<span style="font-size:'+s+'px;color:'+(i<=full?'var(--gold)':'var(--border2)')+'">★</span>';
  return out;
}
function submitReview(pid){
  if(!S.loggedIn){openModal('login');return;}
  var ratingEl=document.getElementById('rev-rating-val');
  var textEl=document.getElementById('rev-text');
  var rating=ratingEl?parseInt(ratingEl.value)||0:0;
  var text=textEl?textEl.value.trim():'';
  if(!rating){showToast('Pick a star rating first');return;}
  if(!text){showToast('Write a review first');return;}
  if(!S.reviews[pid])S.reviews[pid]=[];
  // Replace if user already reviewed
  S.reviews[pid]=S.reviews[pid].filter(function(r){return r.uid!==S.user.handle;});
  S.reviews[pid].unshift({uid:S.user.handle,handle:S.user.handle,avi:S.user.avi,rating:rating,text:text,time:'Just now'});
  showToast('✦ Review posted!');
  openProductModal(pid);
}

// ── Drag & drop handlers (global so inline event attrs can reach them) ──
window._bldrDrag=null;

function bldrDragStart(e,outfitId,zone){
  window._bldrDrag={outfitId:outfitId,zone:zone};
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',outfitId+':'+zone);
  var col=document.getElementById('ocol-'+outfitId);
  if(col) setTimeout(function(){col.classList.add('bldr-col-drag-src');},0);
}
function bldrDragEnd(e){
  document.querySelectorAll('.bldr-drop-valid').forEach(function(el){el.classList.remove('bldr-drop-valid');});
  document.querySelectorAll('.bldr-col-drag-src').forEach(function(el){el.classList.remove('bldr-col-drag-src');});
  window._bldrDrag=null;
}
function bldrDragOver(e,destZone){
  if(!window._bldrDrag) return;
  // Only highlight if zone types match
  if(window._bldrDrag.zone!==destZone) return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('bldr-drop-valid');
}
function bldrDragLeave(e){
  e.currentTarget.classList.remove('bldr-drop-valid');
}
function bldrDrop(e,destOutfitId,destZone){
  e.preventDefault();
  e.currentTarget.classList.remove('bldr-drop-valid');
  var src=window._bldrDrag;
  if(!src) return;
  if(src.zone!==destZone) return; // zone type mismatch — reject
  if(src.outfitId===destOutfitId&&src.zone===destZone) return; // same card
  var srcO=S.outfits.find(function(o){return o.id===src.outfitId;});
  var dstO=S.outfits.find(function(o){return o.id===destOutfitId;});
  if(!srcO||!dstO) return;
  var srcItem=srcO.items[src.zone];
  var dstItem=dstO.items[destZone];
  if(!srcItem) return;
  dstO.items[destZone]=srcItem;
  srcO.items[src.zone]=dstItem||null;
  window._bldrDrag=null;
  showToast('✓ '+srcItem.name+' moved'+(dstItem?' · swapped with '+dstItem.name:''));
  renderBuilder();
}

function bldrSetZone(outfitId,zoneId){
  if(!outfitId||!zoneId){S.builderActiveZone=null;S.builderSearch='';renderBuilder();return;}
  var same=(S.activeOutfitId===outfitId&&S.builderActiveZone===zoneId);
  S.activeOutfitId=outfitId;
  S.builderActiveZone=same?null:zoneId;
  S.builderSearch='';
  renderBuilder();
  // Scroll the picker panel into view on mobile
  var picker=document.querySelector('#builder-root [style*="width:296px"]');
  if(picker&&S.builderActiveZone) picker.scrollIntoView&&picker.scrollIntoView({behavior:'smooth',inline:'end'});
}
function bldrRemoveItem(outfitId,zone){
  var o=S.outfits.find(function(x){return x.id===outfitId;});
  if(!o) return;
  var p=o.items[zone];
  if(p) showToast('Removed '+p.name);
  o.items[zone]=null;
  renderBuilder();if(S.tab==='shop')renderShop();
}
function bldrClearCol(outfitId){
  var o=S.outfits.find(function(x){return x.id===outfitId;});
  if(!o) return;
  o.items={head:null,top:null,bottom:null,shoes:null,acc:null};
  if(S.activeOutfitId===outfitId) S.builderActiveZone=null;
  renderBuilder();showToast('Outfit cleared');
}
function bldrAddColToCart(outfitId){
  var o=S.outfits.find(function(x){return x.id===outfitId;});
  if(!o) return;
  var items=Object.values(o.items).filter(Boolean);
  if(!items.length){showToast('Add some pieces first!');return;}
  items.forEach(function(p){addToCart(p.id,true);});
  showToast(items.length+' pieces from '+o.name+' added!');updateCartBadge();
}

// One-tap post from builder — pre-fills post modal with outfit emojis, style, and cost
function bldrPostLook(outfitId){
  if(!S.loggedIn){openModal('login');return;}
  var o=S.outfits.find(function(x){return x.id===outfitId;});
  if(!o) return;
  var items=Object.values(o.items).filter(Boolean);
  if(!items.length){showToast('Add some pieces to your look first');return;}
  S.activeOutfitId=outfitId;
  // Pre-fill post context so the modal picks up emojis + cost
  S._postPrefill={
    title:o.name,
    cost:items.reduce(function(a,p){return a+(SALE_ITEMS[p.id]?SALE_ITEMS[p.id].salePrice:p.price);},0),
    emoji:items.map(function(p){return p.emoji;})
  };
  openModal('post');
}

// Enter the first open tournament with this outfit
function bldrEnterBattle(outfitId){
  if(!S.loggedIn){openModal('login');return;}
  var o=S.outfits.find(function(x){return x.id===outfitId;});
  if(!o||!Object.values(o.items).filter(Boolean).length){showToast('Build a look first');return;}
  // Find first open tourney the user hasn't joined
  var open=S.tourneys.find(function(t){return t.status==='open'&&!S.joinedIn[t.id];});
  if(!open){
    showToast('No open tournaments right now — check the Battles tab');
    switchTab('battles');
    return;
  }
  S.activeOutfitId=outfitId;
  joinTourney(open.id);
}

function downloadOutfitCard(outfitId){
  var o=S.outfits.find(function(x){return x.id===outfitId;});
  if(!o){showToast('Outfit not found');return;}
  // Build an off-screen canvas card (320×420)
  var canvas=document.createElement('canvas');
  canvas.width=640; canvas.height=840; // 2x for retina
  var ctx=canvas.getContext('2d');
  var items=o.items;
  var total=Object.values(items).filter(Boolean).reduce(function(a,p){return a+p.price;},0);
  var zones=[{id:'head',emoji:items.head?items.head.emoji:'',price:items.head?'$'+items.head.price:'',color:items.head?items.head.color:''},
             {id:'top', emoji:items.top?items.top.emoji:'',price:items.top?'$'+items.top.price:'',color:items.top?items.top.color:''},
             {id:'bottom',emoji:items.bottom?items.bottom.emoji:'',price:items.bottom?'$'+items.bottom.price:'',color:items.bottom?items.bottom.color:''},
             {id:'shoes',emoji:items.shoes?items.shoes.emoji:'',price:items.shoes?'$'+items.shoes.price:'',color:items.shoes?items.shoes.color:''}];

  // Background
  var bgGrad=ctx.createLinearGradient(0,0,640,840);
  bgGrad.addColorStop(0,'#1a1917'); bgGrad.addColorStop(1,'#2c2927');
  ctx.fillStyle=bgGrad; ctx.fillRect(0,0,640,840);

  // Header
  ctx.fillStyle='#c9184a';
  ctx.font='bold 44px serif'; ctx.letterSpacing='10px';
  ctx.fillText('OUTFITD',36,64);
  ctx.fillStyle='rgba(255,255,255,.7)';
  ctx.font='bold 26px monospace';
  ctx.fillText('$'+total, 540, 64);

  // Divider line
  ctx.fillStyle='rgba(255,255,255,.08)';
  ctx.fillRect(0,80,640,1);

  // 2x2 grid of zone cells
  var cellW=319, cellH=330, gap=2, startY=84;
  var positions=[[0,startY],[cellW+gap,startY],[0,startY+cellH+gap],[cellW+gap,startY+cellH+gap]];
  zones.forEach(function(z,i){
    var x=positions[i][0], y=positions[i][1];
    // Cell background
    ctx.fillStyle=z.emoji?'rgba(255,255,255,.06)':'rgba(255,255,255,.02)';
    ctx.fillRect(x,y,cellW,cellH);
    // Emoji (large)
    if(z.emoji){
      ctx.font=z.emoji?'128px serif':'64px serif';
      ctx.textAlign='center';
      ctx.fillText(z.emoji, x+cellW/2, y+cellH/2+40);
      // Price chip
      ctx.fillStyle='rgba(0,0,0,.5)';
      ctx.beginPath(); ctx.roundRect(x+cellW-72,y+10,58,26,10); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.8)'; ctx.font='bold 16px monospace';
      ctx.textAlign='center';
      ctx.fillText(z.price, x+cellW-43, y+28);
    }
    ctx.textAlign='left';
  });

  // Footer
  ctx.fillStyle='rgba(255,255,255,.3)';
  ctx.font='18px monospace';
  ctx.fillText(S.user.handle||'@outfitd', 36, 800);
  ctx.fillStyle='#c9184a';
  ctx.font='bold 18px monospace';
  ctx.textAlign='right';
  ctx.fillText('OUTFITD.COM', 604, 800);

  // Trigger download
  try{
    var link=document.createElement('a');
    link.download='outfitd-look-'+o.name.replace(/[^a-z0-9]/gi,'-').toLowerCase()+'.png';
    link.href=canvas.toDataURL('image/png');
    link.click();
    showToast('Outfit card saved — ready to post!');
  }catch(e){
    showToast('Save not supported in this browser — try right-click on the preview');
  }
}

var _pendingProductSize = null;
function selectProductSize(el, size){
  _pendingProductSize = size;
  rememberSize(size);
  document.querySelectorAll('.size-btn').forEach(function(b){ b.classList.remove('active'); });
  el.classList.add('active');
}
function addToCartWithSize(id){
  var p = ALL_PRODUCTS.find(function(x){ return x.id===id; }); if(!p) return;
  var selectedSize = _pendingProductSize || p.size[0];
  _pendingProductSize = null;
  // Allow same product in different sizes as separate cart entries
  var cartKey = id + '_' + selectedSize;
  var existing = S.cart.find(function(c){ return c.id===id && c.selectedSize===selectedSize; });
  if(!existing){
    var item = Object.assign({}, p, { qty:1, selectedSize:selectedSize, _cartKey:cartKey });
    S.cart.push(item);
    showToast(p.name+' ('+selectedSize+') added to cart');
  } else {
    existing.qty = (existing.qty||1) + 1;
    showToast('Quantity updated to '+existing.qty);
  }
  updateCartBadge(); if(S.cartOpen) renderCart(); if(S.tab==='shop') renderShop();
}
function updateCartQty(id, delta){
  var item = S.cart.find(function(c){ return c.id===id; });
  if(!item) return;
  item.qty = Math.max(1, (item.qty||1) + delta);
  renderCart();
}

function addToCart(id,silent){
  var p=ALL_PRODUCTS.find(function(x){return x.id===id;});if(!p)return;
  if(!S.cart.find(function(c){return c.id===id;})){S.cart.push(Object.assign({},p,{qty:1}));if(!silent)showToast(p.name+' added to cart');}
  else{if(!silent)showToast('Already in cart!');}
  updateCartBadge();if(S.cartOpen)renderCart();if(S.tab==='shop')renderShop();
}

function submitMarketplaceOrder(){
  // Validate required shipping fields
  var required=[
    {id:'co-fname',label:'First name'},{id:'co-lname',label:'Last name'},
    {id:'co-addr1',label:'Street address'},{id:'co-city',label:'City'},
    {id:'co-state',label:'State'},{id:'co-zip',label:'ZIP code'},
  ];
  for(var i=0;i<required.length;i++){
    var el=document.getElementById(required[i].id);
    if(!el||!el.value.trim()){showToast('Please enter your '+required[i].label);if(el)el.focus();return;}
  }
  // Save address
  var saveAddr=document.getElementById('co-save-addr');
  if(saveAddr&&saveAddr.checked){
    S.savedAddress={
      fname:(document.getElementById('co-fname')||{}).value||'',
      lname:(document.getElementById('co-lname')||{}).value||'',
      addr1:(document.getElementById('co-addr1')||{}).value||'',
      city: (document.getElementById('co-city') ||{}).value||'',
      state:(document.getElementById('co-state')||{}).value||'',
      zip:  (document.getElementById('co-zip')  ||{}).value||'',
      phone:(document.getElementById('co-phone')||{}).value||'',
    };
  }
  // Build order record
  var mktItems = S.cart.filter(function(p){return p.type==='marketplace';});
  var subtotal = mktItems.reduce(function(a,p){return a+p.price*(p.qty||1);},0);
  var shipping = subtotal>=100?0:8.99;
  var tax = Math.round(subtotal*0.08*100)/100;
  var total = Math.round((subtotal+shipping+tax)*100)/100;
  var orderNum = 'OFD-MKT-'+Date.now().toString(36).toUpperCase().slice(-8);
  var addr = S.savedAddress||{};
  var order = {
    id: orderNum,
    createdAt: Date.now(),
    buyer: S.user.handle,
    buyerEmail: (document.getElementById('co-email')||{}).value||'',
    shippingAddress: addr.fname+' '+addr.lname+', '+addr.addr1+', '+addr.city+' '+addr.state+' '+addr.zip,
    items: mktItems.map(function(p){return {id:p.id,brand:p.brand,sellerId:p.sellerId,name:p.name,size:p.selectedSize||p.size[0],qty:p.qty||1,price:p.price};}),
    subtotal:subtotal, shipping:shipping, tax:tax, total:total,
    status:'awaiting_fulfillment',
    // In production: payout to seller = total - (total * seller.commissionRate)
    sellerPayout: Math.round((total * 0.85)*100)/100, // 15% platform fee retained
  };
  _ORDERS.push(order);
  // Remove marketplace items from cart
  S.cart = S.cart.filter(function(p){return p.type!=='marketplace';});
  updateCartBadge();
  saveSession(getSessionType());
  showMarketplaceConfirmation(order);
}

function joinTourney(id){
  if(!S.loggedIn){showToast('Log in to enter tournaments');return;}
  if(S_ADMIN&&S_ADMIN.battlesDisabled){showToast('Battles are temporarily paused by admin');return;}
  if(!_rateOK('join')) return;

  var t=S.tourneys.find(function(x){return x.id===id;});if(!t)return;

  // ── Hard single-entry guard (checks both session + signed ledger) ──
  if(_hasEntry(id, S.user.handle)){
    showToast('You have already entered this tournament');
    // Sync joinedIn in case session was wiped
    if(!S.joinedIn[id]) S.joinedIn[id]=true;
    renderBattles();
    return;
  }

  // Double-check: scan entrants list for this handle (catches manual session edits)
  var alreadyInList = t.entrants.some(function(e){
    return e.uid==='me' || (e.user && e.user.toLowerCase()===S.user.handle.toLowerCase());
  });
  if(alreadyInList){
    S.joinedIn[id]=true;
    _recordEntry(id, S.user.handle);
    showToast('You are already entered in this tournament');
    renderBattles();
    return;
  }

  var fee=TIERS[t.tier].entryFee;
  if(getSpendableOP()<fee){showToast('Need '+fmtOP(fee)+' available OP to enter');return;}
  if(t.entrants.length>=t.maxE){showToast('Tournament is full!');return;}
  if(t.status!=='open'){showToast('This tournament is no longer accepting entries');return;}

  // Deduct fee and record — clamp to 0 floor (never allow negative balance)
  S.user.points = Math.max(0, S.user.points - fee);
  S.joinedIn[id]=true;
  _recordEntry(id, S.user.handle);  // signed ledger — survives session edits
  t.entrants.push({uid:'me',user:S.user.handle,avi:S.user.avi,votes:0});

  renderOPPill();
  saveSession(getSessionType());
  showToast('⚡ Entered '+t.title+'! Good luck!');
  renderBattles();
}

function voteFor(tourneyId,uid){
  if(!S.loggedIn){showToast('Log in to vote');return;}
  var t=S.tourneys.find(function(x){return x.id===tourneyId;});
  if(!t||t.status!=='voting'){showToast('Voting is not active for this tournament');return;}

  // ── Self-vote block (by uid AND by handle match) ──
  var entrantEntry=t.entrants.find(function(e){return e.uid===uid;});
  if(uid==='me'||(entrantEntry&&entrantEntry.user&&
      entrantEntry.user.toLowerCase()===S.user.handle.toLowerCase())){
    showToast("You can't vote for yourself!");
    return;
  }

  // ── Single vote guard — session + signed ledger ──
  if(_hasVoted(tourneyId, S.user.handle)){
    showToast('Already voted in this tournament!');
    if(!S.votedIn[tourneyId]) S.votedIn[tourneyId]=_getVotedUID(tourneyId)||uid;
    renderBattles();
    return;
  }

  if(!_rateOK('vote')) return;

  // Record in both session and signed ledger
  S.votedIn[tourneyId]=uid;
  _recordVote(tourneyId, uid, S.user.handle);

  t.entrants.forEach(function(e){if(e.uid===uid)e.votes+=1;});
  __SEC.begin(); addInstantOP(VOTE_OP); __SEC.end();
  showToast('✦ Vote cast! +'+fmtOP(VOTE_OP)+' OP');
  renderBattles();
}

function getAllPosts(){
  var base=JSON.parse(JSON.stringify(FEED_POSTS));
  S.userPosts.forEach(function(p){base.unshift(p);});
  if(S.feedFilter==='following'){
    base=base.filter(function(p){
      if(p.isUserPost)return true;
      var cr=CREATORS.find(function(c){return c.handle===p.user;});
      return cr&&S.following[cr.id];
    });
  } else if(S.feedFilter==='saved'){
    base=base.filter(function(p){return S.savedPosts[p.id];});
  }
  return base;
}

function toggleLike(id){
  if(!S.loggedIn){openModal('login');return;}
  if(!_rateOK('like')) return;
  var wasLiked=S.likedPosts[id];
  S.likedPosts[id]=!wasLiked;

  // Likes no longer award instant OP — they rank posts on the leaderboard.
  // The post owner earns OP at midnight if their post reaches the top 100.
  if(!wasLiked){
    var allPosts=getAllPosts();
    var post=allPosts.find(function(p){return p.id===id;});
    var isOwnPost=post&&post.user===S.user.handle;
    if(!isOwnPost) showToast('♥ Liked — helps them rank on today\'s leaderboard!');
  }

  saveSession(getSessionType());
  renderFeed();
}
function toggleSave(id){
  if(!S.loggedIn){openModal('login');return;}
  S.savedPosts[id]=!S.savedPosts[id];
  saveSession(getSessionType());
  showToast(S.savedPosts[id]?'Saved':'Removed from saved');
  renderFeed();if(S.tab==='creators')renderCrew();
}
function toggleComments(id){S.openComments[id]=!S.openComments[id];renderFeed();}
function submitComment(id){
  if(!S.loggedIn){openModal('login');return;}
  if(!_rateOK('comment')) return;
  var el=document.getElementById('ci-'+id);if(!el)return;
  var txt=el.value.trim();if(!txt)return;
  // Hard cap: 280 chars max, strip control characters
  if(txt.length>280){showToast('Comment too long — max 280 characters');return;}
  txt=txt.replace(/[\u0000-\u001F\u007F]/g,'');
  if(!S.commentTexts['c_'+id])S.commentTexts['c_'+id]=[];
  // Cap per-post comment count from one user (anti-spam)
  var myComments=(S.commentTexts['c_'+id]||[]).filter(function(c){return c.uid==='me';});
  if(myComments.length>=25){showToast('Comment limit reached for this post');return;}
  S.commentTexts['c_'+id].push({uid:'me',avi:S.user.avi,handle:S.user.handle,text:txt});
  el.value='';
  saveSession(getSessionType());
  renderFeed();
}

          '<button class="btn-sm btn-accent" style="width:100%;padding:8px;margin-top:8px" onclick="submitReview('+p.id+')">POST REVIEW ✦</button>'+
        '</div>'
        :
        '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">'+

        '</div>'
      )+
      '<div>'+revHtml+'</div>'+
    '</div>'+

    (function(){
      var targetZones=['head','top','bottom','shoes','acc'];
      var currentZone=p.category==='Accessories'?'acc':p.zone;
      var otherZones=targetZones.filter(function(z){return z!==currentZone;});
      var suggestions=[];
      otherZones.forEach(function(zone){
        var cats={head:['Headwear'],top:['Tops','Activewear'],bottom:['Bottoms'],shoes:['Footwear'],acc:['Accessories']};
        var zoneCats=cats[zone]||[];
        var match=ALL_PRODUCTS.find(function(x){
          if(x.id===p.id||suggestions.indexOf(x)>-1) return false;
          if(zoneCats.indexOf(x.category)<0&&x.zone!==zone) return false;
          return x.style.some(function(s){return p.style.indexOf(s)>-1;});
        });
        if(!match) match=ALL_PRODUCTS.find(function(x){
          return x.id!==p.id&&suggestions.indexOf(x)<0&&(zoneCats.indexOf(x.category)>-1||x.zone===zone);
        });
        if(match) suggestions.push(match);
      });
      suggestions=suggestions.slice(0,4);
      if(!suggestions.length) return '';
      var cmap={Black:'pimg-black',White:'pimg-white',Grey:'pimg-grey',Red:'pimg-red',Blue:'pimg-blue',Green:'pimg-green',Brown:'pimg-brown',Pink:'pimg-pink',Yellow:'pimg-yellow',Purple:'pimg-purple'};
      return '<div class="ctl-section">'+
        '<div class="ctl-title">COMPLETE THE LOOK</div>'+
        '<div class="ctl-scroll">'+
          suggestions.map(function(s){
            var sale=SALE_ITEMS[s.id];

              '<div class="ctl-img '+(cmap[s.color]||'pimg-white')+'"><span style="font-size:28px">'+s.emoji+'</span></div>'+
              '<div class="ctl-body">'+
                '<div class="ctl-brand">'+s.brand+'</div>'+
                (sale?'<div class="ctl-price" style="color:var(--green)">$'+sale.salePrice+'</div>':'<div class="ctl-price">$'+s.price+'</div>')+
              '</div>'+
            '</div>';
          }).join('')+
        '</div>'+
      '</div>';
    })();
}

// Accounts are stored as an array of {email, handle, name, pwHash, createdAt}
// pwHash uses the same hashPass() function used for admin passwords.
function getAccounts(){
  try{ var r=localStorage.getItem(ACCOUNTS_KEY); return r?JSON.parse(r):[]; }catch(e){ return []; }
}
function saveAccounts(arr){
  try{ localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(arr)); }catch(e){}
}
function findAccountByEmail(email){
  var norm=(email||'').toLowerCase().trim();
  return getAccounts().find(function(a){ return a.email===norm; })||null;
}
function findAccountByHandle(handle){
  var norm=(handle||'').toLowerCase().replace('@','');
  return getAccounts().find(function(a){ return (a.handle||'').toLowerCase().replace('@','')===norm; })||null;
}

()wToast('New sig{function handleLogin
  var emailEl = document.getElementById('m-login-email');
  var pwEl    = document.getElementById('m-login-pw');
  var errEl   = document.getElementById('m-login-err');
  function showErr(msg){ if(errEl){errEl.textContent=msg;errEl.style.display='block';} }
  function clearErr(){ if(errEl) errEl.style.display='none'; }

  if(!emailEl||!pwEl){ showToast('Something went wrong — please refresh'); return; }
  var raw   = emailEl.value.trim();
  var pw    = pwEl.value;
  clearErr();

  if(!raw){ showErr('Please enter your email or username'); return; }
  if(!pw) { showErr('Please enter your password'); return; }

  // Determine if user entered an email or a @handle / bare handle
  var acct = null;
  var isHandleEntry = raw.indexOf('@') === 0 || raw.indexOf('@') === -1 && raw.indexOf('.') === -1;

  if(!isHandleEntry && raw.indexOf('@') > 0){
    // Looks like an email
    acct = findAccountByEmail(raw.toLowerCase());
    if(!acct){
      showErr('No account found with that email. Need one? Sign up for free →');
      return;
    }
  } else {
    // Treat as a handle — strip leading @ if present, lowercase
    var handleInput = raw.replace(/^@/,'').toLowerCase().trim();
    acct = findAccountByHandle(handleInput);
    if(!acct){
      showErr('No account found with that username. Check the spelling or sign up →');
      return;
    }
  }

  if(hashPass(pw) !== acct.pwHash){
    showErr('Incorrect password. Please try again.');
    pwEl.value=''; pwEl.focus();
    return;
  }

  // Restore account data into S.user
  S.user.name     = acct.name    || acct.handle || 'StyleFan';
  S.user.handle   = acct.handle  || ('@'+raw.replace(/^@/,''));
  S.user.avi      = acct.avi     || '😎';
  S.user.bio      = acct.bio     || 'Fashion is my language ✦';
  S.user.bannerBg = acct.bannerBg|| 'gradient-default';

  _pendingLogin = { name: S.user.name, handle: S.user.handle, isNew: false, email: acct.email };
  closeModal();
  setTimeout(function(){ openModal('device-choice'); }, 120);
}

function handleSignup(){
  if(S_ADMIN&&S_ADMIN.signupsDisabled){ showToast('New signups are temporarily paused — check back soon'); return; }
  var termsEl=document.getElementById('m-signup-terms');
  var nameEl=document.getElementById('m-signup-name');
  var handleEl=document.getElementById('m-signup-handle');
  var emailEl=document.getElementById('m-signup-email');
  var pwEl=document.getElementById('m-signup-pw');
  var pw2El=document.getElementById('m-signup-pw2');
  var refEl=document.getElementById('m-signup-referral');
  var errEl=document.getElementById('m-signup-err');
  function showErr(msg){ if(errEl){errEl.textContent=msg;errEl.style.display='block';} }
  function clearErr(){ if(errEl) errEl.style.display='none'; }
  clearErr();
  if(termsEl&&!termsEl.checked){ showErr('Please agree to the Terms of Service to continue'); return; }
  var name=(nameEl?nameEl.value.trim():'').slice(0,50)||'StyleFan';
  var handle=handleEl?handleEl.value.trim():'';
  if(!handle){ showErr('Please choose a username'); return; }
  handle=handle.toLowerCase().replace(/^@/,'').replace(/[^a-z0-9_]/g,'').slice(0,30);
  if(handle.length<2){ showErr('Username must be at least 2 characters'); return; }
  var email=emailEl?emailEl.value.trim().toLowerCase():'';
  if(!email||!email.includes('@')){ showErr('Please enter a valid email address'); return; }
  var pw=pwEl?pwEl.value:'';
  var pw2=pw2El?pw2El.value:'';
  if(pw.length<8){ showErr('Password must be at least 8 characters'); return; }
  if(pw!==pw2){ showErr('Passwords do not match'); return; }
  var referral=refEl?refEl.value.trim():'';
  var submitBtn=document.querySelector('#modal-content .btn-mok');
  if(submitBtn){ submitBtn.disabled=true; submitBtn.textContent='CREATING...'; }
  fetch('http://localhost:3001/api/auth/signup',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    credentials:'include',
    body:JSON.stringify({email:email,password:pw,handle:handle,displayName:name,referral:referral})
  })
  .then(function(r){return r.json();})
  .then(function(data){
    if(submitBtn){submitBtn.disabled=false;submitBtn.textContent='JOIN FREE';}
    if(data.error){showErr(data.error);return;}
    S.loggedIn=true;
    S.user={name:data.user.display_name||name,handle:data.user.handle,email:data.user.email,avi:data.user.avi||'😎',points:data.user.points||0,role:data.user.role||'user',id:data.user.id};
    closeModal();
    showToast('Welcome to OUTFITD, @'+S.user.handle+'! 🎉');
    renderCrewNavTab();
    renderCrew();
    setTimeout(function(){openModal('device-choice');},120);
  })
  .catch(function(err){
    if(submitBtn){submitBtn.disabled=false;submitBtn.textContent='JOIN FREE';}
    showErr('Signup failed — please try again');
    console.error('Signup error:',err);
  });
}

function buyTheme(id){
  if(!S.loggedIn){showToast('Log in to unlock themes');return;}
  var theme=THEMES.find(function(t){return t.id===id;});
  if(!theme){showToast('Theme not found');return;}
  if(!S.user.ownedThemes) S.user.ownedThemes=[];
  // Prevent double-buy
  if(S.user.ownedThemes.indexOf(id)>-1){
    applyTheme(id); closeModal();
    showToast('Theme already owned — applied!');
    return;
  }
  if(getSpendableOP()<theme.cost){showToast('Need '+fmtOP(theme.cost)+' OP to unlock this theme');return;}
  S.user.ownedThemes.push(id);
  S.user.points = Math.max(0, S.user.points - theme.cost);
  renderOPPill();
  applyTheme(id);
  saveSession(getSessionType());
  closeModal();
  showToast('🎨 '+theme.name+' theme unlocked and applied!');
}

// ═══════════════════════════════════════ ADMIN SYSTEM ════════════════════════

// Admin handles stored as hashes — never expose raw handles in source.
// To add an admin: compute hashAdminHandle('yourhandle') in browser console once, paste result below.
function hashAdminHandle(h){
  var s=(h||'').toLowerCase().replace('@','')+'_outfitd_admin_salt_v1';
  var hash=0x811c9dc5;
  for(var i=0;i<s.length;i++){hash^=s.charCodeAt(i);hash=(hash*0x01000193)>>>0;}
  return hash.toString(16);
}
// Pre-computed hashes (raw handles never stored here):
var ADMIN_HANDLE_HASHES=(function(){return ['wyk'].map(hashAdminHandle);})();

function checkAutoAdmin(){
  if(!S.loggedIn) return;
  var h=(S.user.handle||'').toLowerCase().replace('@','');
  var hashed=hashAdminHandle(h);
  if(ADMIN_HANDLE_HASHES.indexOf(hashed)>-1){
    S_ADMIN.loggedIn=true;
    var navb=document.getElementById('admin-nav-btn');
    if(navb) navb.style.display='flex';
    // Restore session
    try{
      localStorage.setItem(S_ADMIN.sessionKey,JSON.stringify({
        hash:_ADMIN_HASH, expires:Date.now()+(24*60*60*1000)
      }));
    }catch(e){}
  }
}

// To update the admin password: use the "Change Password" section inside the Admin Panel.
// The hash is stored in localStorage and never committed to source.
// On first launch (no saved hash), admin must set a password via the panel.

// Simple non-crypto hash for client-side check (sufficient for single-file prototype)
// In production, replace with real server-side auth
function hashPass(str){
  var hash=0,i,chr;
  for(i=0;i<str.length;i++){chr=str.charCodeAt(i);hash=((hash<<5)-hash)+chr;hash|=0;}
  var salted=Math.abs(hash).toString(16)+'_outfitd_'+str.length;
  var h2=0;
  for(i=0;i<salted.length;i++){chr=salted.charCodeAt(i);h2=((h2<<5)-h2)+chr;h2|=0;}
  return Math.abs(h2).toString(16).padStart(8,'0')+'_'+Math.abs(hash).toString(16).padStart(8,'0');
}

// _ADMIN_HASH: loaded from localStorage; falls back to seeded constant if first run
var _ADMIN_HASH = (function(){
  try{
    var raw=localStorage.getItem('outfitd_admin_session');
    if(raw){ var d=JSON.parse(raw); if(d.hash) return d.hash; }
  }catch(e){}
  // First-run fallback — matches the pre-seeded admin account password
  return '75b4eb4c_57c7acb4';
})();

var S_ADMIN = {
  loggedIn: false,
  editMode: false,
  sessionKey: 'outfitd_admin_session'
};

function _isAdminHandle(){
  if(!S.loggedIn) return false;
  var h=(S.user.handle||'').toLowerCase().replace('@','');
  return typeof hashAdminHandle==='function' &&
         typeof ADMIN_HANDLE_HASHES!=='undefined' &&
         ADMIN_HANDLE_HASHES.indexOf(hashAdminHandle(h))>-1;
}

function adminLogin(){

  openModal('admin-login');
}

function adminLogout(){

function checkAdminSession(){
  try{
    var raw=localStorage.getItem(S_ADMIN.sessionKey);
    if(!raw) return;
    var d=JSON.parse(raw);
    // Always re-sync the hash from localStorage (handles password changes)
    if(d.hash) _ADMIN_HASH=d.hash;
    // Only restore admin session if the currently logged-in user is an admin handle
    if(d.hash && d.hash===_ADMIN_HASH && d.expires>Date.now() && _isAdminHandle()){
      S_ADMIN.loggedIn=true;
      var _navb=document.getElementById('admin-nav-btn');if(_navb)_navb.style.display='flex';
    } else if(!_isAdminHandle()){
