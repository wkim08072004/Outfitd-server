      S_ADMIN.loggedIn=false;
      var _nb2=document.getElementById('admin-nav-btn');if(_nb2)_nb2.style.display='none';
    } else {
      localStorage.removeItem(S_ADMIN.sessionKey);
      _ADMIN_HASH=null;
    }
  }catch(e){}
}

// Admin login attempt throttle (max 5 attempts per session)
var _adminLoginAttempts = 0;
var _adminLockUntil = 0;

function verifyAdminPassword(pw){
  if(!_ADMIN_HASH) return false; // no password set yet
  return hashPass(pw) === _ADMIN_HASH;
}

function handleAdminLogin(){
  var el=document.getElementById('m-admin-pw');
  if(!el) return;
  var pw=el.value;
  if(!pw){showToast('Enter the admin password');return;}

  // Brute-force lockout
  if(Date.now() < _adminLockUntil){
    var secs=Math.ceil((_adminLockUntil-Date.now())/1000);
    showToast('Too many attempts — wait '+secs+'s');
    el.value=''; return;
  }

  if(!verifyAdminPassword(pw)){
    _adminLoginAttempts++;
    el.value=''; el.focus();
    if(_adminLoginAttempts>=5){
      _adminLockUntil=Date.now()+(60*1000); // 60s lockout
      _adminLoginAttempts=0;
      showToast('Too many failed attempts — locked for 60s');
    } else {
      showToast('Incorrect password ('+_adminLoginAttempts+'/5)');
    }
    return;
  }

  _adminLoginAttempts=0;
  S_ADMIN.loggedIn=true;
  try{

function adminClearReport(id){
  if(!S_ADMIN.loggedIn||!_isAdminHandle()){return;}
  if(S.reportedPosts) S.reportedPosts[id]=false;

function adminGrantOP(){
  if(!S_ADMIN.loggedIn||!_isAdminHandle()){return;}
  var el=document.getElementById('admin-op-amount');
  var amount=parseInt((el&&el.value)||0);
  if(!amount||amount<1||amount>10000000){showToast('Enter a valid amount (1 – 10,000,000)');return;}
  __SEC.begin(); addInstantOP(amount, null, true); __SEC.end();
  if(el) el.value='';
  showToast('✦ Admin granted '+fmtOP(amount)+' OP → '+S.user.handle);
  renderAdminPanel();
}
function adminChangePassword(){
  if(!S_ADMIN.loggedIn||!_isAdminHandle()){return;}
  var p1=document.getElementById('admin-new-pw');
  var p2=document.getElementById('admin-new-pw2');
  if(!p1||!p1.value.trim()){showToast('Enter a new password');return;}
  if(p1.value.length<8){showToast('Password must be at least 8 characters');return;}
  if(p1.value!==p2.value){showToast('Passwords do not match');return;}
  _ADMIN_HASH=hashPass(p1.value);
  try{
    localStorage.setItem(S_ADMIN.sessionKey,JSON.stringify({
      hash:_ADMIN_HASH,expires:Date.now()+(8*60*60*1000)
    }));
  }catch(e){}
  p1.value='';p2.value='';
  showToast('✓ Password updated — remember your new password!');
}

// Admin keyboard shortcut — only fires for recognised admin accounts, never for regular users
if(document.addEventListener) document.addEventListener('keydown',function(e){
  if(e.ctrlKey&&e.shiftKey&&e.key==='A'){
    // Only allow the shortcut if the current user is a known admin handle
    var isAdmin = S.loggedIn && (function(){
      var h=(S.user.handle||'').toLowerCase().replace('@','');
      return typeof hashAdminHandle==='function' &&
             typeof ADMIN_HANDLE_HASHES!=='undefined' &&
             ADMIN_HANDLE_HASHES.indexOf(hashAdminHandle(h))>-1;
    })();
    if(!isAdmin) return; // silently ignore for all non-admin users
    if(!S_ADMIN.loggedIn) openModal('admin-login');
    else openAdminPanel();
    e.preventDefault();
  }
});

// ── ONBOARDING TOOLTIPS (first-visit, post-login) ────────────
var _ONBOARD_KEY='outfitd_onboarded_v1';
var _onbSteps=[
  {sel:'#bnav-builder,.nav-tab:nth-child(2)',title:'BUILDER',text:'Mix & match pieces to create a full outfit, then save it or enter a Battle.',dir:'below'},
  {sel:'#bnav-battles,.nav-tab:nth-child(3)',title:'BATTLES',text:'Enter style tournaments, get votes, win OP points, and climb the Hall of Fame.',dir:'below'},
  {sel:'#op-pill-wrap',title:'OP POINTS',text:'Your style currency. Post looks, earn likes, and place in the daily Top 100 to win OP from the pool. Spend on themes and post frames.',dir:'below'},
  {sel:'#bnav-shop,.logo',title:'FILTERS',text:'In the Shop, use the sidebar to filter by brand, category, color, and price.',dir:'below'},
];
var _onbIdx=0,_onbPop=null,_onbOvr=null;

function _onbClear(){
  if(_onbPop){_onbPop.remove();_onbPop=null;}
  if(_onbOvr){_onbOvr.remove();_onbOvr=null;}
}
function _onbStep(i){
  _onbClear();
  if(i>=_onbSteps.length){
    try{localStorage.setItem(_ONBOARD_KEY,'1');}catch(e){}
    showToast('Welcome to OUTFITD! 🎉 You\'re all set.');
    return;
  }
  _onbIdx=i;
  var step=_onbSteps[i];
  var tEl=null;
  step.sel.split(',').forEach(function(s){if(!tEl){var el=document.querySelector(s.trim());if(el&&el.getBoundingClientRect().width>0)tEl=el;}});
  if(!tEl){_onbStep(i+1);return;}

  _onbOvr=document.createElement('div');
  _onbOvr.className='onboard-overlay';
  _onbOvr.onclick=function(){_onbStep(_onbIdx+1);};
  document.body.appendChild(_onbOvr);

  var rect=tEl.getBoundingClientRect();
  var tipW=230;
  var left=Math.max(10,Math.min(rect.left,window.innerWidth-tipW-10));
  var below=step.dir==='below';
  _onbPop=document.createElement('div');
  _onbPop.className='onboard-pop';
  _onbPop.style.cssText='position:fixed;background:var(--text);color:var(--surface);padding:12px 14px;border-radius:10px;font-size:12px;font-weight:500;line-height:1.55;max-width:'+tipW+'px;z-index:8000;box-shadow:0 8px 36px rgba(0,0,0,.18);width:'+tipW+'px;left:'+left+'px;top:'+(below?rect.bottom+12:rect.top-140)+'px;';
  var arrowOff=Math.max(10,Math.min(rect.left+rect.width/2-left-6,tipW-20));
  _onbPop.innerHTML=
    '<div style="position:absolute;width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;'+
    (below?'top:-10px;border-bottom:10px solid var(--text)':'bottom:-10px;border-top:10px solid var(--text)')+
    ';left:'+arrowOff+'px"></div>'+
    '<div style="font-family:var(--font-d);font-size:15px;letter-spacing:1.5px;margin-bottom:5px">'+step.title+'</div>'+
    '<div style="opacity:.85">'+step.text+'</div>'+
    '<div style="margin-top:10px;display:flex;justify-content:space-between;align-items:center">'+
      '<span style="font-size:10px;opacity:.45;font-family:var(--font-m)">'+(i+1)+' / '+_onbSteps.length+'</span>'+
      '<button onclick="_onbStep('+(i+1)+')" style="padding:4px 12px;background:var(--surface);color:var(--text);border:none;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font-b)">'+
        (i+1<_onbSteps.length?'NEXT →':'GOT IT ✓')+
      '</button>'+
    '</div>';
  document.body.appendChild(_onbPop);
}

function startOnboarding(){
  try{if(localStorage.getItem(_ONBOARD_KEY))return;}catch(e){}
  if(!S.loggedIn)return;
  setTimeout(function(){_onbStep(0);},1000);
}

// Patch loadSession to trigger onboarding for new users
(function(){
  var _origLS=loadSession;
  if(typeof _origLS==='function'){
    loadSession=function(){
      _origLS.apply(this,arguments);
      setTimeout(startOnboarding,900);
    };
  }
})();
